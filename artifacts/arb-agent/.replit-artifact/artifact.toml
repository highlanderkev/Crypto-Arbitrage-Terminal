kind = "web"
previewPath = "/"
title = "Arbitrage Research Agent"
version = "1.0.0"
id = "artifacts/arb-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21355

[services.development]
run = "pnpm --filter @workspace/arb-agent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arb-agent", "run", "build" ]
publicDir = "artifacts/arb-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21355"
BASE_PATH = "/"
